<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Jeu du bonneteau</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="game">
            <h1>Jeu du bonneteau</h1>

            <div id="pot"></div>

            <h2>Mise (CHF)</h2>

            <input type="number" id="txtNumber" />

            <div class="buttons">
                <button id="btn1">Gobelet 1</button>
                <button id="btn2">Gobelet 2</button>
                <button id="btn3">Gobelet 3</button>
            </div>

            <div id="txtMessage"></div>
        </div>
    </body>

    <script>
        const printpot = document.getElementById("pot");
        const number = document.getElementById("txtNumber");
        const message = document.getElementById("txtMessage");

        const btn1 = document.getElementById("btn1");
        const btn2 = document.getElementById("btn2");
        const btn3 = document.getElementById("btn3");

        let pot = 100;

        printpot.innerHTML = `Vous possédez ${pot} CHF.`;

        function game(select) {
          
              const good = Math.floor(Math.random() * 3) + 1;
              const bet = parseInt(number.value);
  
              if (bet > pot) {
                  message.innerHTML = `Votre mise ne peut pas dépasser votre pot actuel.`;
                  return;
              }
              if (isNaN(bet) || bet <= 0) {
                  message.innerHTML = `Veuillez entrer une mise valide.`;
                  return;
              }
              if (select === good) {
                  pot += bet;
                  message.innerHTML = `Félicitations ! Vous avez gagné ${number.value} CHF.`;
              } else {
                  pot -= bet;
                  message.innerHTML = `Perdu ! Vour perdez ${number.value} CHF. Le bon gobelet était le ${good}.`;
                  if (pot <= 0) {
                      message.innerHTML += " Vous avez perdu tout votre argent !";
                      pot = 0;
                  }
              }
              if (pot <= 0) {
                  disableButtons();
                  message.innerHTML = `Vous avez perdu tout votre argent !`;
              }
              printpot.innerHTML = `Vous possédez ${pot} CHF.`;
        } 

        function disableButtons() {
            btn1.disabled = true;
            btn2.disabled = true;
            btn3.disabled = true;
        }

        btn1.addEventListener("click", () => game(1));
        btn2.addEventListener("click", () => game(2));
        btn3.addEventListener("click", () => game(3));
    </script>
</html>
